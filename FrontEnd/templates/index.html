<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JWT Dashboard Upload System</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/script.js" defer></script>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div class="box" id="loginBox">
  <h2>Login</h2>
  <form id="loginForm">
    <label>Email</label>
    <input type="email" id="loginEmail" required />

    <label>Password</label>
    <input type="password" id="loginPassword" required />

    <button type="submit">Login</button>
  </form>
  <div id="loginMessage" class="message"></div>
</div>

<!-- ================= APP WRAPPER ================= -->
<div id="appBox" class="hidden app-wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3 class="special">ITR HUB</h3>

    <ul>
      <li onclick="showSection('dashboardSection')">Dashboard</li>
      <li onclick="showSection('assistantSection')">Assistant</li>
      <li onclick="showSection('requestSection')">Requests</li>
      <li id="logoutBtn" ">Logout</li>
    </ul>

    <div class="sidebar-footer">
      <span id="userInfo"class="special">Logged in</span>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- ================= DASHBOARD ================= -->
    <section id="dashboardSection" class="page-section active">

      <div class="box">
        <h2>Dashboard</h2>
        <p id="dashboardName">Hey, Welcome  </p>
        <p id="dashboardEmail">LoginId </p>
      </div>

      <!-- UPLOAD AREA (GLOBAL DRAG DROP) -->
      <div class="box upload-box">
        <h3>Drag & Drop Upload</h3>

        <form id="uploadForm">
          <input type="file" id="fileInput" name="user_file" />

          <div class="checkbox-group">
            <label><input type="checkbox" name="option1" /> Status Check</label>
            <label><input type="checkbox" name="option2" /> E-Verify</label>
            <label><input type="checkbox" name="option3" /> Pending Actions</label>
            <label><input type="checkbox" name="option4" /> Grievance</label>
          </div>

          <button type="submit">Upload</button>
        </form>

        <div id="uploadProgressBlock" class="hidden">
          Uploading: <span id="uploadPercent">0%</span>
          <div class="progress-wrap">
            <div id="uploadProgressBar" class="progress-bar"></div>
          </div>
        </div>

        <div id="statusMessage" class="message"></div>
      </div>

      <!-- 2 RECENT REQUESTS ONLY -->
      <div class="box">
        <h3>Recent Requests</h3>
        <div id="recentRequestList"></div>
      </div>

    </section>

    <!-- ================= REQUESTS ================= -->
    <section id="requestSection" class="page-section">
      <h2>All Requests (Last 2 Days)</h2>
      <div id="requestList" class="box"></div>
    </section>

    <!-- ================= ASSISTANT ================= -->
    <section id="assistantSection" class="page-section">

      <h2>Assistant Mode</h2>

      <!-- SAME UPLOAD + DROP -->
      <div class="box">
        <form id="assistantUploadForm">
          <input type="file" id="assistantFileInput" />

          <button type="submit">Upload & Process</button>
        </form>

        <div id="assistantProgressBlock" class="hidden">
          Uploading: <span id="assistantPercent">0%</span>
          <div class="progress-wrap">
            <div id="assistantBar" class="progress-bar"></div>
          </div>
        </div>

        <div id="assistantStatusMessage" class="message"></div>
      </div>

      <!-- CLIENT TABLE OUTPUT -->
      <div class="box">
        <h3>Client Data</h3>
        <table border="1" width="100%">
          <thead>
            <tr>
              <th>S.No</th>
              <th>Client Name</th>
              <th>PAN</th>
              <th>Password</th>
            </tr>
          </thead>
          <tbody id="clientTableBody"></tbody>
        </table>
      </div>

    </section>

  </div>
</div>

</body>
</html>
