<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload</title>

<style>
body{
    font-family: Arial;
    margin:20px;
}

.box{
    border:1px solid #ccc;
    padding:15px;
    margin-bottom:20px;
}

.request-card{
    border:1px solid #ccc;
    padding:10px;
    margin-bottom:10px;
}

.progress-wrap{
    width:100%;
    height:10px;
    background:#eee;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#4f46e5;
}
</style>

</head>
<body>

<h2>Upload File</h2>

<div class="box">

<form id="uploadForm">

<div>
<input type="file" name="user_file" id="fileInput" required>
</div>

<br>

<div>
<label><input type="checkbox" name="option1"> status check</label><br>
<label><input type="checkbox" name="option2"> Option 2</label><br>
<label><input type="checkbox" name="option3"> Option 3</label><br>
<label><input type="checkbox" name="option4"> Option 4</label>
</div>

<br>

<button type="submit">Upload</button>

</form>

<br>

<div id="statusMessage"></div>

<div id="uploadProgressBlock" style="display:none;">
Uploading: <span id="uploadPercent">0%</span>
<div class="progress-wrap">
<div class="progress-bar" id="uploadProgressBar"></div>
</div>
</div>

</div>


<h3>Requests (last 2 days)</h3>

<div id="requestList" class="box">
<div class="empty-state">No requests yet.</div>
</div>


<script>

let polling = {}

const form = document.getElementById("uploadForm")
const fileInput = document.getElementById("fileInput")
const statusMessage = document.getElementById("statusMessage")
const uploadProgressBlock = document.getElementById("uploadProgressBlock")
const uploadProgressBar = document.getElementById("uploadProgressBar")
const uploadPercent = document.getElementById("uploadPercent")
const requestList = document.getElementById("requestList")



function addRequestCard(req){

    const emptyState = requestList.querySelector(".empty-state")
    if(emptyState) emptyState.remove()

    const card = document.createElement("div")
    card.className = "request-card"
    card.id = "req-"+req.id

    card.innerHTML = `
        <b>${req.name}</b>
        <div>id: ${req.id}</div>
        <div>status: <span class="status">${req.status}</span></div>
        <div>progress: <span class="progress">0/${req.total_jobs}</span></div>

        <div class="progress-wrap">
            <div class="progress-bar"></div>
        </div>

        <div class="download"></div>
    `

    requestList.prepend(card)

}



async function fetchStatus(request_id){

    const res = await fetch(`/requests/${request_id}/status`)
    if(!res.ok) return

    const data = await res.json()

    const card = document.getElementById("req-"+request_id)
    if(!card) return

    const statusEl = card.querySelector(".status")
    const progressEl = card.querySelector(".progress")
    const bar = card.querySelector(".progress-bar")
    const downloadDiv = card.querySelector(".download")

    statusEl.innerText = data.status
    progressEl.innerText = `${data.completed_jobs}/${data.total_jobs}`

    const percent = Math.round((data.completed_jobs / data.total_jobs) * 100)
    bar.style.width = percent+"%"

    if(data.status === "completed"){

        if(downloadDiv.innerHTML === ""){
            downloadDiv.innerHTML = `
            <br>
            <a href="/requests/${request_id}/download">⬇ Download Excel</a>
            `
        }

        clearInterval(polling[request_id])
        delete polling[request_id]
    }

}



function startPolling(id){

    fetchStatus(id)

    polling[id] = setInterval(()=>{
        fetchStatus(id)
    },5000)

}



async function loadRecentRequests(){

    const res = await fetch("/requests/recent")
    if(!res.ok) return

    const data = await res.json()

    if(!data.length) return

    const emptyState = requestList.querySelector(".empty-state")
    if(emptyState) emptyState.remove()

    for(const req of data){

        addRequestCard(req)
        startPolling(req.id)

    }

}



form.addEventListener("submit",function(event){

    event.preventDefault()

    if(!fileInput.files[0]){
        statusMessage.innerText="select file"
        return
    }

    uploadProgressBlock.style.display="block"

    const formData = new FormData(form)

    const xhr = new XMLHttpRequest()

    xhr.open("POST","/upload",true)

    xhr.responseType="json"

    xhr.upload.onprogress=function(e){

        if(e.lengthComputable){

            const percent = Math.round((e.loaded/e.total)*100)

            uploadProgressBar.style.width=percent+"%"
            uploadPercent.innerText=percent+"%"

        }

    }

    xhr.onload=function(){

        const result = xhr.response

        statusMessage.innerText=result.message

        addRequestCard({
            id:result.request_id,
            name:fileInput.files[0].name,
            status:"queued",
            total_jobs:0
        })

        startPolling(result.request_id)

    }

    xhr.send(formData)

})



loadRecentRequests()

</script>

</body>
</html>
