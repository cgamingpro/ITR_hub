<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload</title>
<style>
body{
    font-family: Arial;
    margin:20px;
    max-width: 900px;
}

.box{
    border:1px solid #ccc;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
}

.request-card{
    border:1px solid #ccc;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
}

.progress-wrap{
    width:100%;
    height:10px;
    background:#eee;
    border-radius:999px;
    overflow:hidden;
    margin-top:6px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#4f46e5;
}

button{
    cursor:pointer;
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:#4f46e5;
    color:white;
}

button.secondary{
    background:#6b7280;
}

button.danger{
    background:#dc2626;
}

input[type="email"],
input[type="password"],
input[type="file"]{
    margin-top:6px;
    margin-bottom:10px;
}

.hidden{
    display:none;
}

.small{
    font-size: 0.9rem;
    color: #555;
}
</style>
</head>
<body>

<h2>JWT Login + Upload</h2>

<!-- LOGIN SECTION -->
<div class="box" id="loginBox">
    <h3>Login</h3>

    <form id="loginForm">
        <div>
            <label>Email</label><br>
            <input type="email" id="loginEmail" required>
        </div>

        <div>
            <label>Password</label><br>
            <input type="password" id="loginPassword" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <div id="loginMessage" style="margin-top:10px;"></div>
</div>

<!-- APP SECTION -->
<div id="appBox" class="hidden">

    <div class="box">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
            <div>
                <b id="userInfo">Logged in</b>
                <div class="small">Token is stored in localStorage for now.</div>
            </div>
            <button class="secondary" id="logoutBtn" type="button">Logout</button>
        </div>
    </div>

    <h2>Upload File</h2>

    <div class="box">
        <form id="uploadForm">
            <div>
                <input type="file" name="user_file" id="fileInput" required>
            </div>

            <div>
                <label><input type="checkbox" name="option1"> status check</label><br>
                <label><input type="checkbox" name="option2"> Option 2</label><br>
                <label><input type="checkbox" name="option3"> Option 3</label><br>
                <label><input type="checkbox" name="option4"> Option 4</label>
            </div>

            <br>
            <button type="submit">Upload</button>
        </form>

        <br>

        <div id="statusMessage"></div>

        <div id="uploadProgressBlock" class="hidden">
            Uploading: <span id="uploadPercent">0%</span>
            <div class="progress-wrap">
                <div class="progress-bar" id="uploadProgressBar"></div>
            </div>
        </div>
    </div>

    <h3>Requests (last 2 days)</h3>

    <div id="requestList" class="box">
        <div class="empty-state">No requests yet.</div>
    </div>
</div>

<script>
let polling = {};
let accessToken = localStorage.getItem("access_token") || null;

const loginBox = document.getElementById("loginBox");
const appBox = document.getElementById("appBox");
const loginForm = document.getElementById("loginForm");
const loginEmail = document.getElementById("loginEmail");
const loginPassword = document.getElementById("loginPassword");
const loginMessage = document.getElementById("loginMessage");
const logoutBtn = document.getElementById("logoutBtn");

const form = document.getElementById("uploadForm");
const fileInput = document.getElementById("fileInput");
const statusMessage = document.getElementById("statusMessage");
const uploadProgressBlock = document.getElementById("uploadProgressBlock");
const uploadProgressBar = document.getElementById("uploadProgressBar");
const uploadPercent = document.getElementById("uploadPercent");
const requestList = document.getElementById("requestList");
const userInfo = document.getElementById("userInfo");

function authHeaders() {
    return accessToken ? {
        "Authorization": "Bearer " + accessToken
    } : {};
}

async function apiFetch(url, options = {}) {
    const headers = new Headers(options.headers || {});
    const auth = authHeaders();
    for (const [k, v] of Object.entries(auth)) {
        headers.set(k, v);
    }

    const res = await fetch(url, {
        ...options,
        headers
    });

    if (res.status === 401) {
        logout();
        throw new Error("Unauthorized");
    }

    return res;
}

function setLoggedInUI(isLoggedIn) {
    loginBox.classList.toggle("hidden", isLoggedIn);
    appBox.classList.toggle("hidden", !isLoggedIn);
}

function logout() {
    accessToken = null;
    localStorage.removeItem("access_token");

    Object.values(polling).forEach(id => clearInterval(id));
    polling = {};

    requestList.innerHTML = '<div class="empty-state">No requests yet.</div>';
    statusMessage.innerText = "";
    loginMessage.innerText = "";
    loginPassword.value = "";

    setLoggedInUI(false);
    userInfo.innerText = "Logged out";
}

async function loadMe() {
    const res = await apiFetch("/users/me");
    if (!res.ok) throw new Error("Failed to load user");

    const user = await res.json();
    userInfo.innerText = `Logged in as ${user.name} (${user.email})`;
}

function addRequestCard(req) {
    const emptyState = requestList.querySelector(".empty-state");
    if (emptyState) emptyState.remove();

    let card = document.getElementById("req-" + req.id);

    if (!card) {
        card = document.createElement("div");
        card.className = "request-card";
        card.id = "req-" + req.id;

        card.innerHTML = `
            <b class="req-name"></b>
            <div>id: <span class="req-id"></span></div>
            <div>status: <span class="status"></span></div>
            <div>progress: <span class="progress"></span></div>

            <div class="progress-wrap">
                <div class="progress-bar"></div>
            </div>

            <div class="download" style="margin-top:10px;"></div>
        `;

        requestList.prepend(card);
    }

    card.querySelector(".req-name").innerText = req.name;
    card.querySelector(".req-id").innerText = req.id;
    card.querySelector(".status").innerText = req.status;
    card.querySelector(".progress").innerText = `0/${req.total_jobs}`;
}

async function downloadExcel(request_id) {
    const res = await apiFetch(`/requests/${request_id}/download`);
    if (!res.ok) {
        statusMessage.innerText = "Download failed";
        return;
    }

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${request_id}.xlsx`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url);
}

async function fetchStatus(request_id) {
    const res = await apiFetch(`/requests/${request_id}/status`);
    if (!res.ok) return;

    const data = await res.json();
    const card = document.getElementById("req-" + request_id);
    if (!card) return;

    const statusEl = card.querySelector(".status");
    const progressEl = card.querySelector(".progress");
    const bar = card.querySelector(".progress-bar");
    const downloadDiv = card.querySelector(".download");

    statusEl.innerText = data.status;
    progressEl.innerText = `${data.completed_jobs}/${data.total_jobs}`;

    const percent = data.total_jobs > 0
        ? Math.round((data.completed_jobs / data.total_jobs) * 100)
        : 0;

    bar.style.width = percent + "%";

    if (data.status === "completed") {
        if (downloadDiv.innerHTML === "") {
            downloadDiv.innerHTML = `
                <button type="button" class="secondary">Download Excel</button>
            `;
            downloadDiv.querySelector("button").addEventListener("click", () => {
                downloadExcel(request_id);
            });
        }

        clearInterval(polling[request_id]);
        delete polling[request_id];
    }
}

function startPolling(id) {
    fetchStatus(id);
    polling[id] = setInterval(() => {
        fetchStatus(id).catch(() => {});
    }, 5000);
}

async function loadRecentRequests() {
    const res = await apiFetch("/requests/recent");
    if (!res.ok) return;

    const data = await res.json();

    if (!data.length) return;

    const emptyState = requestList.querySelector(".empty-state");
    if (emptyState) emptyState.remove();

    for (const req of data) {
        addRequestCard(req);
        startPolling(req.id);
    }
}

loginForm.addEventListener("submit", async function(event) {
    event.preventDefault();

    loginMessage.innerText = "Logging in...";

    const body = new URLSearchParams();
    body.append("username", loginEmail.value.trim());
    body.append("password", loginPassword.value);

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: body.toString()
        });

        const data = await res.json();

        if (!res.ok) {
            loginMessage.innerText = data.detail || "Login failed";
            return;
        }

        accessToken = data.access_token;
        localStorage.setItem("access_token", accessToken);

        loginMessage.innerText = "Login successful";
        setLoggedInUI(true);

        await loadMe();
        await loadRecentRequests();
    } catch (err) {
        loginMessage.innerText = "Login error";
    }
});

logoutBtn.addEventListener("click", logout);

form.addEventListener("submit", function(event) {
    event.preventDefault();

    if (!accessToken) {
        statusMessage.innerText = "Please log in first.";
        return;
    }

    if (!fileInput.files[0]) {
        statusMessage.innerText = "Select file";
        return;
    }

    uploadProgressBlock.classList.remove("hidden");
    uploadProgressBar.style.width = "0%";
    uploadPercent.innerText = "0%";
    statusMessage.innerText = "Uploading...";

    const formData = new FormData(form);

    const xhr = new XMLHttpRequest();
    xhr.open("POST", "/upload", true);
    xhr.responseType = "json";
    xhr.setRequestHeader("Authorization", "Bearer " + accessToken);

    xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            uploadProgressBar.style.width = percent + "%";
            uploadPercent.innerText = percent + "%";
        }
    };

    xhr.onload = function() {
        const result = xhr.response;

        if (xhr.status === 401) {
            logout();
            return;
        }

        if (!result) {
            statusMessage.innerText = "Upload failed";
            return;
        }

        if (xhr.status >= 400) {
            statusMessage.innerText = result.detail || "Upload failed";
            return;
        }

        statusMessage.innerText = result.message;

        addRequestCard({
            id: result.request_id,
            name: fileInput.files[0].name,
            status: "queued",
            total_jobs: 0
        });

        startPolling(result.request_id);
    };

    xhr.onerror = function() {
        statusMessage.innerText = "Network error during upload";
    };

    xhr.send(formData);
});

async function boot() {
    if (!accessToken) {
        setLoggedInUI(false);
        return;
    }

    try {
        setLoggedInUI(true);
        await loadMe();
        await loadRecentRequests();
    } catch (err) {
        logout();
    }
}

boot();
</script>

</body>
</html>
